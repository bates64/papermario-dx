name: Build
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  game:
    name: Game
    runs-on: ubuntu-latest
    outputs:
      rom-sha256: ${{ steps.rom-sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v15
        with:
          name: papermario-dx
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Download base ROM
        run: |
          curl -L $BASEROM_US_URL -o papermario.us.z64
          nix-store --add-fixed sha256 papermario.us.z64
        env:
          BASEROM_US_URL: ${{ secrets.BASEROM_US_URL }}
      - name: Cache build and asset directories
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-build-${{ hashFiles('flake.nix') }}
          path: |
            ver/us/build
            assets/us
            .n2_db
            .ninja_deps
      - name: Build shell
        run: nix develop --command true
      - name: Configure
        run: nix develop --command "./configure"
      - uses: root-project/gcc-problem-matcher-improved@v0.0.1-alpha.1
      - name: Build game
        run: nix develop --command "ninja"
      - name: Build patch file
        run: nix develop --command ninja ver/us/build/papermario.bps
      - name: Get repository name
        id: repo-name
        uses: MariachiBear/get-repo-name-action@v1.1.0
        with:
          string-case: paramCase
      - name: Upload patch as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.repo-name.outputs.repository-name }}.bps
          path: ver/us/build/papermario.bps
      - name: Compute ROM SHA256
        id: rom-sha
        run: echo "sha256=$(sha256sum ver/us/build/papermario.z64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Get changed files
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          files=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -E '\.(c|cpp|h|hpp)$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check formatting
        if: github.event_name == 'pull_request' && steps.changed.outputs.files != ''
        continue-on-error: true
        run: |
          nix develop --command bash -c 'echo "$1" | xargs python3 tools/format.py --check' _ "${{ steps.changed.outputs.files }}"

      - name: Run clang-tidy
        if: github.event_name == 'pull_request' && steps.changed.outputs.files != ''
        continue-on-error: true
        run: |
          nix develop --command bash -c '
            echo "$1" | xargs clang-tidy -p . --quiet 2>&1 | while IFS= read -r line; do
              if echo "$line" | grep -qE "^[^:]+\.(c|cpp|h|hpp):[0-9]+:[0-9]+: (warning|error):"; then
                file=$(echo "$line" | cut -d: -f1)
                lineno=$(echo "$line" | cut -d: -f2)
                col=$(echo "$line" | cut -d: -f3)
                rest=$(echo "$line" | cut -d: -f4-)
                echo "::warning file=$file,line=$lineno,col=$col::$rest"
              fi
            done
          ' _ "${{ steps.changed.outputs.files }}"

  windows-toolchain:
    name: Windows Toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v15
        with:
          name: papermario-dx
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Download base ROM
        run: |
          curl -L $BASEROM_US_URL -o papermario.us.z64
          nix-store --add-fixed sha256 papermario.us.z64
        env:
          BASEROM_US_URL: ${{ secrets.BASEROM_US_URL }}
      - name: Build Windows toolchain
        run: nix build .#windows-toolchain
      - name: Upload toolchain as artifact
        uses: actions/upload-artifact@v4
        with:
          name: papermario-dx-windows.zip
          path: result/papermario-dx-windows.zip
  game-windows:
    name: Game (Windows)
    runs-on: windows-latest
    needs: [windows-toolchain]
    outputs:
      rom-sha256: ${{ steps.windows-rom-sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
      - name: Download base ROM
        run: curl -L $env:BASEROM_US_URL -o ver/us/baserom.z64
        env:
          BASEROM_US_URL: ${{ secrets.BASEROM_US_URL }}
      - name: Download Windows toolchain
        uses: actions/download-artifact@v4
        with:
          name: papermario-dx-windows.zip
      - name: Extract toolchain
        run: 7z x -aoa papermario-dx-windows.zip
      - name: Build game
        run: |
          $env:PATH = "$PWD\papermario-dx-windows\bin;$PWD\papermario-dx-windows\python;$env:PATH"
          $env:PYTHONUTF8 = "1"
          python.exe tools/build/configure.py
          ninja.exe
      - name: Compute ROM SHA256
        id: windows-rom-sha
        run: |
          $hash = (Get-FileHash ver/us/build/papermario.z64 -Algorithm SHA256).Hash.ToLower()
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
  rom-match:
    name: Verify ROM Match
    runs-on: ubuntu-latest
    needs: [game, game-windows]
    steps:
      - name: Compare SHA256 hashes
        run: |
          linux="${{ needs.game.outputs.rom-sha256 }}"
          windows="${{ needs.game-windows.outputs.rom-sha256 }}"
          echo "Linux ROM SHA256:   $linux"
          echo "Windows ROM SHA256: $windows"
          if [ "$linux" != "$windows" ]; then
            echo "::error::ROM mismatch! Windows and Linux builds produced different ROMs."
            exit 1
          fi
          echo "ROMs match."
