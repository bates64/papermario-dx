name: Build
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  game:
    name: Game
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v15
        with:
          name: papermario-dx
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Download base ROM
        run: |
          curl -L $BASEROM_US_URL -o papermario.us.z64
          nix-store --add-fixed sha256 papermario.us.z64
        env:
          BASEROM_US_URL: ${{ secrets.BASEROM_US_URL }}
      - name: Cache build and asset directories
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-build-${{ hashFiles('flake.nix') }}
          path: |
            ver/us/build
            assets/us
            .n2_db
            .ninja_deps
      - name: Build shell
        run: nix develop --command true
      - name: Configure
        run: nix develop --command "./configure"
      - uses: root-project/gcc-problem-matcher-improved@v0.0.1-alpha.1
      - name: Build game
        run: nix develop --command "ninja"
      - name: Build patch file
        run: nix develop --command ninja ver/us/build/papermario.bps
      - name: Package tarball
        run: |
          tag="${GITHUB_REF_NAME:-dev}"
          sdkdir="papermario-dx-${tag}"
          mkdir -p "$sdkdir/ver/us/build"
          rsync -a include/ "$sdkdir/include/"
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' src/ "$sdkdir/src/"
          rsync -a ver/us/include/ "$sdkdir/ver/us/include/"
          rsync -a --exclude='precompiled.h.gch' ver/us/build/include/ "$sdkdir/ver/us/build/include/"
          cp ver/us/build/syms.ld "$sdkdir/ver/us/build/"
          cp ver/us/build/papermario.bps "$sdkdir/ver/us/build/"
          rsync -a tools/build/ "$sdkdir/tools/build/"
          tar czf "${sdkdir}.tar.gz" "$sdkdir"
      - name: Upload tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: papermario-dx
          path: papermario-dx-*.tar.gz
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: game
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: papermario-dx
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: papermario-dx-*.tar.gz
