name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  windows-toolchain:
    name: Windows Toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v15
        with:
          name: papermario-dx
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Download base ROM
        run: |
          curl -L $BASEROM_US_URL -o papermario.us.z64
          nix-store --add-fixed sha256 papermario.us.z64
        env:
          BASEROM_US_URL: ${{ secrets.BASEROM_US_URL }}
      - name: Verify Windows and Linux ROMs match
        run: nix build .#checks.x86_64-linux.windows-linux-match
      - name: Build Windows toolchain
        run: nix build .#windows-toolchain
      - name: Upload toolchain as artifact
        uses: actions/upload-artifact@v4
        with:
          name: papermario-dx-windows.zip
          path: result/papermario-dx-windows.zip
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: windows-toolchain
    permissions:
      contents: write
    steps:
      - name: Download Windows toolchain artifact
        uses: actions/download-artifact@v4
        with:
          name: papermario-dx-windows.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: papermario-dx-windows.zip
