name: PR label check

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check for release label
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          for label in $LABELS; do
            case "$label" in
              breaking|feature|fix|internal|ci) exit 0 ;;
            esac
          done
          echo "::error::PR needs a release label (breaking, feature, fix, internal, or ci)"
          exit 1
